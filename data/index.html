<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detector de Incendios SE</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="titulo-estado">Estado del Sistema</h1>

      <div class="grid">
        <div class="card" id="card-sensores">
          <h2>Sensores</h2>
          <div class="data-row"><span>Temperatura:</span> <span class="value" id="temp">--</span></div>
          <div class="data-row"><span>Humo (MQ2):</span> <span class="value" id="humo">--</span></div>
          <div class="data-row"><span>Presión:</span> <span class="value" id="presion">--</span></div>
        </div>

        <div class="card" id="card-actuadores">
          <h2>Actuadores</h2>
          <div class="data-row"><span>Servo (Ángulo):</span> <span class="value" id="servo">--</span></div>
          <div class="data-row"><span>Alarma LED:</span> <span class="value" id="led">--</span></div>
        </div>

        <div class="card" id="card-configuracion">
          <h2>Configuración</h2>
          <div class="data-row"><span>Umbral Temp:</span> <span class="value" id="umb_temp">--</span></div>
          <div class="data-row"><span>Umbral Humo:</span> <span class="value" id="umb_humo">--</span></div>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
